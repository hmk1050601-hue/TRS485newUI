<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2aa6bf">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<title>HMK 使用者設定</title>
<style>
  :root{
    --top:#279bb3;
    --top2:#32acc5;
    --panel:#f3f3f1;
    --teal:#1a8ea5;
    --line:#b8d7df;
    --danger:#d25a5a;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    min-height:100%;
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:var(--top);
  }
  body{color:#fff}
  .app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg,var(--top2) 0 42%,var(--panel) 42% 100%);
  }
  .top{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:env(safe-area-inset-top,0) 0 0;
  }
  .header{
    height:66px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-bottom:1px solid rgba(255,255,255,.45);
    padding:0 16px;
  }
  .backBtn{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    gap:6px;
    border:0;
    background:transparent;
    color:#e8f6fb;
    font-size:16px;
    padding:8px 6px;
    cursor:pointer;
  }
  .backBtn svg{
    width:26px;
    height:26px;
    stroke:currentColor;
    fill:none;
    stroke-width:2.2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .brand{font-size:40px;font-weight:900;letter-spacing:.02em;line-height:1}
  .panel{
    max-width:430px;
    margin:0 auto;
    width:100%;
    padding:18px 18px calc(22px + env(safe-area-inset-bottom,0));
    color:var(--teal);
  }
  .title{
    color:#fff;
    text-align:center;
    font-size:22px;
    font-weight:800;
    margin:18px 0 6px;
  }
  .subtitle{
    text-align:center;
    margin:0 0 16px;
    color:rgba(255,255,255,.94);
    font-size:14px;
  }
  .formCard{
    background:#fff;
    border:1px solid #d8e9ed;
    border-radius:16px;
    padding:10px;
    box-shadow:0 10px 24px rgba(0,0,0,.08);
  }
  .actionBtn{
    width:100%;
    min-height:52px;
    border:1px solid var(--line);
    border-radius:14px;
    background:#fff;
    color:var(--teal);
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    margin:8px 0;
    padding:0 12px;
  }
  .actionBtn:active{transform:scale(.99)}
  .actionBtn.warn{
    color:var(--danger);
    border-color:#e6baba;
    background:#fff8f8;
  }
  .msg{
    margin-top:12px;
    min-height:22px;
    color:#4f7f8a;
    font-size:14px;
    text-align:center;
    line-height:1.5;
  }
  .msg.err{color:#c34f4f}
  .msg.ok{color:#2aa06e}

  .dlgMask{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(7,47,58,.36);
    z-index:1300;
    padding:16px;
  }
  .dlgMask.show{display:flex}
  .dlgBox{
    width:min(92vw,360px);
    background:#fff;
    border:1px solid #b8d7df;
    border-radius:16px;
    box-shadow:0 18px 38px rgba(0,0,0,.24);
    overflow:hidden;
  }
  .dlgHead{
    background:linear-gradient(180deg,var(--top2),var(--top));
    color:#fff;
    padding:12px 14px;
    font-size:17px;
    font-weight:800;
  }
  .dlgBody{
    padding:14px;
    color:#2a5f69;
    font-size:15px;
    line-height:1.6;
    white-space:pre-line;
  }
  .dlgInput{
    width:100%;
    min-height:42px;
    border:1px solid #b8d7df;
    border-radius:10px;
    padding:0 12px;
    font-size:16px;
    color:#245c67;
    margin-top:8px;
    outline:none;
  }
  .dlgInput:focus{border-color:var(--top2);box-shadow:0 0 0 3px rgba(50,172,197,.18)}
  .dlgBtns{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    padding:0 14px 14px;
  }
  .dlgBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    min-width:88px;
    min-height:38px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--teal);
    font-size:14px;
    font-weight:800;
    cursor:pointer;
  }
  .dlgBtn.primary{
    border-color:transparent;
    background:linear-gradient(180deg,#2aa6bf,#1a8ea5);
    color:#fff;
  }
  @media (min-width:480px){
    .app{display:flex;flex-direction:column;align-items:center}
    .top,.panel{width:430px}
    .top{border-top-left-radius:18px;border-top-right-radius:18px;margin-top:10px}
    .panel{border-bottom-left-radius:18px;border-bottom-right-radius:18px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="header">
      <button id="backBtn" class="backBtn" type="button" aria-label="返回首頁">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
        <span>使用者設定</span>
      </button>
      <div class="brand" aria-label="HMK">HMK</div>
    </div>

    <div class="panel">
      <div class="title">使用者設定</div>
      <p class="subtitle">請選擇要執行的項目</p>

      <div class="formCard">
        <button id="pwdSetupBtn" type="button" class="actionBtn">設備網路密碼設定</button>
        <button id="pwdOffBtn" type="button" class="actionBtn">設備熱點密碼取消</button>
        <button id="clearAllBtn" type="button" class="actionBtn warn">回復原廠設定</button>
      </div>

      <p id="msg" class="msg"></p>
    </div>
  </div>
</div>

<div id="dlgMask" class="dlgMask" aria-hidden="true">
  <div class="dlgBox" role="dialog" aria-modal="true" aria-labelledby="dlgTitle">
    <div id="dlgTitle" class="dlgHead">提示</div>
    <div class="dlgBody">
      <div id="dlgText"></div>
      <input id="dlgInput" class="dlgInput" type="password" style="display:none" />
    </div>
    <div class="dlgBtns">
      <button id="dlgCancel" type="button" class="dlgBtn">取消</button>
      <button id="dlgOk" type="button" class="dlgBtn primary">確定</button>
    </div>
  </div>
</div>

<script>
(function(){
  const AP_BASE = 'http://192.168.4.1';
  let lastResolvedBase = '';

  const $ = s => document.querySelector(s);

  function showMsg(text, isErr){
    const m = $('#msg');
    if(!m) return;
    m.textContent = text || '';
    m.className = isErr ? 'msg err' : (text ? 'msg ok' : 'msg');
  }

  function openDialog(opts){
    const mask = $('#dlgMask');
    const title = $('#dlgTitle');
    const text = $('#dlgText');
    const input = $('#dlgInput');
    const ok = $('#dlgOk');
    const cancel = $('#dlgCancel');
    if(!mask || !title || !text || !input || !ok || !cancel) return Promise.resolve({ok:false, value:''});

    title.textContent = opts.title || '提示';
    text.textContent = opts.message || '';
    ok.textContent = opts.okText || '確定';
    cancel.textContent = opts.cancelText || '取消';
    cancel.style.display = opts.showCancel === false ? 'none' : 'inline-flex';

    if(opts.input){
      input.style.display = 'block';
      input.type = opts.inputType || 'text';
      input.value = opts.inputValue || '';
      input.placeholder = opts.inputPlaceholder || '';
    }else{
      input.style.display = 'none';
      input.value = '';
    }

    mask.classList.add('show');
    mask.setAttribute('aria-hidden', 'false');

    if(opts.input){
      setTimeout(()=>{ try{ input.focus(); input.select(); }catch(e){} }, 0);
    }else{
      setTimeout(()=>{ try{ ok.focus(); }catch(e){} }, 0);
    }

    return new Promise(resolve => {
      function close(result){
        mask.classList.remove('show');
        mask.setAttribute('aria-hidden', 'true');
        ok.removeEventListener('click', onOk);
        cancel.removeEventListener('click', onCancel);
        mask.removeEventListener('click', onMask);
        input.removeEventListener('keydown', onInputKey);
        resolve(result);
      }
      function onOk(){ close({ok:true, value: input.value || ''}); }
      function onCancel(){ close({ok:false, value:''}); }
      function onMask(e){ if(e.target === mask && opts.showCancel !== false) onCancel(); }
      function onInputKey(e){
        if(e.key === 'Enter'){ e.preventDefault(); onOk(); }
        if(e.key === 'Escape' && opts.showCancel !== false){ e.preventDefault(); onCancel(); }
      }

      ok.addEventListener('click', onOk);
      cancel.addEventListener('click', onCancel);
      mask.addEventListener('click', onMask);
      input.addEventListener('keydown', onInputKey);
    });
  }

  async function askConfirm(title, message, okText, cancelText){
    const r = await openDialog({
      title,
      message,
      okText: okText || '確定',
      cancelText: cancelText || '取消',
      showCancel:true,
      input:false
    });
    return !!r.ok;
  }

  async function askPrompt(title, message, cfg){
    const r = await openDialog({
      title,
      message,
      okText: (cfg && cfg.okText) || '確定',
      cancelText: (cfg && cfg.cancelText) || '取消',
      showCancel:true,
      input:true,
      inputType: (cfg && cfg.inputType) || 'text',
      inputValue: (cfg && cfg.inputValue) || '',
      inputPlaceholder: (cfg && cfg.inputPlaceholder) || ''
    });
    if(!r.ok) return null;
    return String(r.value || '');
  }

  async function showInfoDialog(title, message){
    await openDialog({
      title,
      message,
      okText:'我知道了',
      showCancel:false,
      input:false
    });
  }

  function clearLocalCredentials(){
    const keys = [
      'hmk_ip',
      'hmk_hotspot_name_display',
      'hmk_device_link_password',
      'hmk_device_link_password_enabled',
      'hmk_wifi_ssid',
      'hmk_wifi_password',
      'wifi_ssid',
      'wifi_password',
      'hmk_first_run_done'
    ];
    keys.forEach(k => {
      try{ localStorage.removeItem(k); }catch(e){}
    });
  }

  function normalizeHost(s){
    if(!s) return '';
    return String(s).trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'');
  }

  function getIp(){
    try{ return localStorage.getItem('hmk_ip') || ''; }catch(e){ return ''; }
  }

  function saveIp(ip){
    try{
      if(ip === '') localStorage.removeItem('hmk_ip');
      else if(ip) localStorage.setItem('hmk_ip', ip);
    }catch(e){}
  }

  function candidateBases(){
    const out = [];
    const add = b => { if(b && !out.includes(b)) out.push(b); };
    const ip = normalizeHost(getIp());
    let currentHost = '';
    try{ currentHost = normalizeHost(location.hostname || ''); }catch(e){}

    const currentBase = (currentHost && /^(\d+\.){3}\d+$/.test(currentHost)) ? ('http://' + currentHost) : '';
    const ipBase = (ip && ip !== '192.168.4.1') ? ('http://' + ip) : '';

    add(currentBase);
    if(lastResolvedBase && lastResolvedBase !== currentBase) add(lastResolvedBase);
    if(ipBase && ipBase !== currentBase && ipBase !== lastResolvedBase) add(ipBase);
    add(AP_BASE);
    return out;
  }

  function isOnDeviceAp(){
    let host = '';
    try{ host = normalizeHost(location.hostname || ''); }catch(e){}
    return host === '192.168.4.1';
  }

  async function canReachDeviceAp(){
    try{
      const r = await fetchWithTimeout(AP_BASE + '/ping?ts=' + Date.now(), {cache:'no-store'}, 1400);
      return !!(r && r.ok);
    }catch(e){
      return false;
    }
  }

  async function fetchWithTimeout(url, options, ms){
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), ms);
    try{
      return await fetch(url, Object.assign({}, options || {}, {signal: ctrl.signal}));
    } finally {
      clearTimeout(t);
    }
  }

  async function smartFetch(path, options, timeouts){
    const bases = candidateBases();
    let lastErr = null;
    for(const base of bases){
      const timeoutMs = base === AP_BASE
        ? ((timeouts && timeouts.ap) || 1500)
        : ((timeouts && timeouts.ip) || 2600);
      try{
        const res = await fetchWithTimeout(base + path, options || {}, timeoutMs);
        if(!res.ok){
          lastErr = new Error('HTTP ' + res.status);
          continue;
        }
        try{
          const u = new URL(base);
          if(u.hostname && u.hostname !== '192.168.4.1') saveIp(u.hostname);
        }catch(e){}
        lastResolvedBase = base;
        return {res, base};
      }catch(e){
        lastErr = e;
      }
    }
    throw lastErr || new Error('device offline');
  }

  async function postForm(path, payload){
    const body = new URLSearchParams(payload || {}).toString();
    return smartFetch(path, {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body,
      cache:'no-store'
    }, {ap:1800, ip:3000});
  }

  async function postToApNoCors(path, payload){
    const body = new URLSearchParams(payload || {});
    try{
      await fetchWithTimeout(AP_BASE + path, {
        method:'POST',
        mode:'no-cors',
        body,
        cache:'no-store'
      }, 1800);
      return true;
    }catch(e){
      // AP 套用密碼時常會快速重啟，請求可能在回應前斷線；視為已送出。
      return true;
    }
  }

  $('#backBtn')?.addEventListener('click', ()=>{
    location.href = './index.html';
  });

  $('#pwdSetupBtn')?.addEventListener('click', async ()=>{
    const apOk = isOnDeviceAp() || await canReachDeviceAp();
    if(!apOk){
      await showInfoDialog('請先連線設備網路', '請先連線設備網路（HMK-Setup / 192.168.4.1）再進行密碼設定。');
      showMsg('請先連線設備網路（HMK-Setup / 192.168.4.1）再進行密碼設定。', true);
      return;
    }

    const pass = await askPrompt('設備網路密碼設定', '請輸入設備 AP 密碼（8~32 碼）：', {
      inputType:'password',
      inputPlaceholder:'輸入 8~32 碼密碼'
    });
    if(pass === null) return;
    const p = String(pass).trim();
    if(p.length < 8 || p.length > 32){
      showMsg('密碼長度需為 8~32 碼。', true);
      return;
    }

    showMsg('設定中，請稍候...', false);
    try{
      await postToApNoCors('/setappass', {pass:p});
      showMsg('設備網路密碼已設定，AP 會重新啟動，請重新連線。', false);
    }catch(e){
      showMsg('設定失敗：' + (e && e.message ? e.message : e), true);
    }
  });

  $('#pwdOffBtn')?.addEventListener('click', async ()=>{
    const ok = await askConfirm(
      '設備熱點密碼取消',
      '確定要取消設備熱點密碼？\n取消後，AP 會變成免密碼連線。',
      '確定取消',
      '返回'
    );
    if(!ok) return;

    showMsg('處理中，請稍候...', false);
    try{
      await postToApNoCors('/disableappass', {});
      showMsg('已取消設備熱點密碼，AP 會重新啟動。', false);
    }catch(e){
      showMsg('取消失敗：' + (e && e.message ? e.message : e), true);
    }
  });

  $('#clearAllBtn')?.addEventListener('click', async ()=>{
    const ok = await askConfirm(
      '回復原廠設定',
      '回復原廠設定說明：\n'
      + '1. 清空設備密碼（AP 密碼）\n'
      + '2. 清空家用網路 IP 連接設定\n'
      + '3. 清空用電所有記錄\n'
      + '4. 清空電熱管標準\n\n'
      + '是否確定執行？',
      '確定執行',
      '取消'
    );
    if(!ok) return;

    showMsg('回復原廠設定中，請稍候...', false);
    let powerlogOk = false;
    let heaterStdOk = false;
    let factoryOk = false;

    try{
      await postForm('/api/powerlog', {reset:'all'});
      powerlogOk = true;
    }catch(e){}

    try{
      await postForm('/api/hhreset', {});
      heaterStdOk = true;
    }catch(e){}

    try{
      await postForm('/factoryreset', {});
      factoryOk = true;
    }catch(e){}

    clearLocalCredentials();

    if(factoryOk && powerlogOk && heaterStdOk){
      showMsg('已完成回復原廠設定：AP 密碼、IP、用電記錄與電熱管標準皆已清空。', false);
      return;
    }
    if(factoryOk && (!powerlogOk || !heaterStdOk)){
      showMsg('已清空 AP 密碼與 IP，但用電記錄或電熱管標準清空失敗，請稍後再試。', true);
      return;
    }
    showMsg('回復原廠設定失敗，請確認已連線到設備後重試。', true);
  });
})();
</script>
</body>
</html>
