<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2aa6bf">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HMK">
<title>HMK 電費明細</title>
<style>
  :root{
    --top:#279bb3;
    --top2:#32acc5;
    --panel:#f3f3f1;
    --line:rgba(255,255,255,.35);
    --teal:#2aa6bf;
    --tealDeep:#1a8ea5;
    --chip:#dff2f7;
    --err:#c34f4f;
    --ok:#2aa06e;
    --android-nav-inset:0px;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    min-height:100%;
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:var(--top);
    color:#fff;
  }
  .app{
    height:100vh;
    height:100dvh;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg,var(--top2) 0 34%,var(--panel) 34% 100%);
  }
  .top{
    max-width:430px;
    width:100%;
    margin:0 auto;
    padding:env(safe-area-inset-top,0) 0 0;
  }
  .header{
    height:66px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-bottom:1px solid rgba(255,255,255,.45);
    padding:0 16px;
  }
  .backBtn{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    gap:6px;
    border:0;
    background:transparent;
    color:#e8f6fb;
    font-size:18px;
    font-weight:700;
    padding:8px 6px;
    cursor:pointer;
  }
  .backBtn svg{
    width:26px;
    height:26px;
    stroke:currentColor;
    fill:none;
    stroke-width:2.2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .brand{font-size:40px;font-weight:900;letter-spacing:.02em;line-height:1}

  .content{
    max-width:430px;
    width:100%;
    margin:0 auto;
    padding:12px 20px calc(22px + env(safe-area-inset-bottom,0) + var(--android-nav-inset));
    color:var(--tealDeep);
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .toolbar{
    background:#fff;
    border-radius:16px;
    border:1px solid #d7e8ec;
    padding:12px;
    box-shadow:0 10px 24px rgba(0,0,0,.08);
  }
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13px;font-weight:800;color:#5d8894}
  select,input{
    border:1px solid #cfe2e8;
    border-radius:12px;
    min-height:38px;
    padding:0 10px;
    color:#1f5d6b;
    font-size:14px;
    background:#fff;
  }
  .nativeSelect{
    position:absolute;
    width:1px;
    height:1px;
    opacity:0;
    pointer-events:none;
    overflow:hidden;
  }
  .selBtn{
    position:relative;
    border:1px solid #cfe2e8;
    border-radius:12px;
    min-height:38px;
    padding:0 34px 0 10px;
    color:#1f5d6b;
    font-size:14px;
    font-weight:700;
    background:linear-gradient(180deg,#f8fdff 0%,#edf7fb 100%);
    text-align:left;
    cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  }
  .selBtn .text{
    display:block;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .selBtn::after{
    content:'';
    position:absolute;
    right:12px;
    top:50%;
    width:8px;
    height:8px;
    border-right:2px solid #2aa6bf;
    border-bottom:2px solid #2aa6bf;
    transform:translateY(-64%) rotate(45deg);
  }
  .selBtn.compact{
    min-height:34px;
    padding:0 28px 0 10px;
    max-width:92px;
    font-size:13px;
    border-radius:10px;
  }
  .customWrap{margin-top:10px;display:none}
  .customWrap.show{display:block}
  .summary{
    margin-top:10px;
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:8px;
  }
  .card{
    background:#fff;
    border:1px solid #d7e8ec;
    border-radius:14px;
    padding:10px;
    text-align:center;
  }
  .label{font-size:12px;color:#6f99a4;font-weight:800}
  .num{margin-top:4px;font-size:24px;font-weight:900;color:var(--tealDeep);line-height:1.05}
  .numSub{font-size:13px;color:#6f99a4;font-weight:700}

  .listCard{
    margin-top:10px;
    background:#fff;
    border:1px solid #d7e8ec;
    border-radius:16px;
    overflow:hidden;
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .listHead{
    padding:10px 12px;
    border-bottom:1px solid #e2edf1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#5d8894;
    font-weight:800;
  }
  .tableWrap{
    flex:1 1 auto;
    min-height:0;
    overflow:auto;
    padding-bottom:calc(14px + env(safe-area-inset-bottom,0) + var(--android-nav-inset));
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
  }
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 12px;border-bottom:1px solid #eef4f6;text-align:center;white-space:nowrap}
  th{font-size:12px;color:#6f99a4;font-weight:900;background:#f8fcfd;position:sticky;top:0;z-index:1}
  .pos{color:var(--ok);font-weight:800}
  .neg{color:var(--err);font-weight:800}

  .msg{
    margin-top:10px;
    min-height:20px;
    font-size:13px;
    text-align:center;
    color:#5d8894;
  }
  .msg.err{color:var(--err)}
  .msg.ok{color:var(--ok)}
  .pickerMask{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    background:rgba(10,42,52,.42);
    z-index:1800;
    padding:14px 10px calc(12px + env(safe-area-inset-bottom,0));
  }
  .pickerMask.show{display:flex}
  .pickerPanel{
    width:min(430px,100%);
    max-height:min(72dvh,520px);
    background:#f3fbfe;
    border:1px solid #9ecfda;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 16px 40px rgba(0,0,0,.28);
    display:flex;
    flex-direction:column;
  }
  .pickerHead{
    height:52px;
    padding:0 14px;
    border-bottom:1px solid #cfe7ee;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(180deg,#dff2f7 0%,#d1ebf3 100%);
  }
  .pickerTitle{
    color:#1a8ea5;
    font-size:16px;
    font-weight:900;
    letter-spacing:.02em;
  }
  .pickerClose{
    border:0;
    background:#2aa6bf;
    color:#fff;
    border-radius:999px;
    min-width:64px;
    min-height:32px;
    padding:0 12px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
  }
  .pickerList{
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:8px;
    touch-action:pan-y;
  }
  .pickerItem{
    width:100%;
    border:1px solid #d4e9ef;
    border-radius:12px;
    background:#fff;
    color:#1f5d6b;
    min-height:42px;
    padding:0 12px;
    margin:0 0 8px;
    text-align:left;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .pickerItem:last-child{margin-bottom:2px}
  .pickerItem.active{
    background:linear-gradient(180deg,#2aa6bf 0%,#2298b0 100%);
    color:#fff;
    border-color:#2298b0;
  }
  .pickerItem:disabled{
    opacity:.5;
    cursor:not-allowed;
  }


  @media (min-width:480px){
    .app{display:flex;flex-direction:column;align-items:center}
    .top,.content{width:430px}
    .top{border-top-left-radius:18px;border-top-right-radius:18px;margin-top:10px}
    .content{border-bottom-left-radius:18px;border-bottom-right-radius:18px}
  }
</style>
<script src="./version.js?v=13164"></script>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="header">
      <button id="backBtn" class="backBtn" type="button" aria-label="返回上一頁">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
        <span>電費明細</span>
      </button>
      <div class="brand" aria-label="HMK"><img src="./HMK_logo_text.png" alt="HMK" style="height:80px;width:auto;display:block;object-fit:contain"></div>
    </div>
  </div>

  <div class="content">
    <div class="toolbar">
      <div class="grid">
        <div class="field">
          <label for="modeSel">模式</label>
          <select id="modeSel" class="nativeSelect">
            <option value="day">日</option>
            <option value="month" selected>月</option>
            <option value="year">年</option>
          </select>
          <button id="modeSelBtn" class="selBtn" type="button" data-select="modeSel" aria-haspopup="dialog" aria-expanded="false">
            <span class="text">月</span>
          </button>
        </div>
        <div class="field">
          <label for="periodSel">期間</label>
          <select id="periodSel" class="nativeSelect"></select>
          <button id="periodSelBtn" class="selBtn" type="button" data-select="periodSel" aria-haspopup="dialog" aria-expanded="false">
            <span class="text">--</span>
          </button>
        </div>
        <div class="field">
          <label for="pwrSel">功率</label>
          <select id="pwrSel" class="nativeSelect">
            <option value="4">4 kW</option>
            <option value="6">6 kW</option>
            <option value="custom">其它</option>
          </select>
          <button id="pwrSelBtn" class="selBtn" type="button" data-select="pwrSel" aria-haspopup="dialog" aria-expanded="false">
            <span class="text">4 kW</span>
          </button>
        </div>
        <div class="field">
          <label for="rateInp">電費(元/度)</label>
          <input id="rateInp" type="number" step="0.01" min="0" inputmode="decimal" value="1.68">
        </div>
      </div>

      <div id="pwrCustomWrap" class="customWrap">
        <div class="field">
          <label for="pwrCustomInp">其它功率(kW)</label>
          <input id="pwrCustomInp" type="number" step="0.1" min="0.1" inputmode="decimal" placeholder="請輸入功率">
        </div>
      </div>

      <div class="summary">
        <div class="card">
          <div class="label">本期時數</div>
          <div id="hoursVal" class="num">--</div>
          <div class="numSub">小時</div>
        </div>
        <div class="card">
          <div class="label">本期度數</div>
          <div id="kwhVal" class="num">--</div>
          <div class="numSub">度</div>
        </div>
        <div class="card">
          <div class="label">本期電費</div>
          <div id="costVal" class="num">--</div>
          <div class="numSub">元</div>
        </div>
      </div>

    </div>

    <div class="listCard">
      <div class="listHead">
        <span id="tableTitle">期間明細</span>
        <select id="unitSel" class="nativeSelect">
          <option value="h" selected>小時</option>
          <option value="k">度</option>
          <option value="c">元</option>
        </select>
        <button id="unitSelBtn" class="selBtn compact" type="button" data-select="unitSel" aria-haspopup="dialog" aria-expanded="false">
          <span class="text">小時</span>
        </button>
        <span id="metaText">--</span>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>期間</th>
              <th>本期</th>
              <th>去年同期</th>
              <th>差異</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <div id="msg" class="msg"></div>
  </div>
</div>
<div id="pickerMask" class="pickerMask" aria-hidden="true">
  <div class="pickerPanel" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
    <div class="pickerHead">
      <div id="pickerTitle" class="pickerTitle">選擇</div>
      <button id="pickerClose" class="pickerClose" type="button">關閉</button>
    </div>
    <div id="pickerList" class="pickerList"></div>
  </div>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const AP_BASE = 'http://192.168.4.1';
  let lastResolvedBase = '';
  let powerData = null;
  let activePickerSelect = null;

  function setupAndroidBottomInset(){
    try{
      const ua = String((navigator && navigator.userAgent) || '');
      if(!/android/i.test(ua)) return;

      const root = document.documentElement;
      const vv = window.visualViewport;
      if(!root) return;

      const apply = () => {
        const innerH = Number(window.innerHeight || 0);
        const vvH = Number((vv && vv.height) || innerH);
        const vvTop = Number((vv && vv.offsetTop) || 0);
        let inset = Math.max(0, innerH - vvH - vvTop);

        // 軟鍵盤開啟時避免把鍵盤高度誤判為底部導航列
        if(inset > 140) inset = 0;

        root.style.setProperty('--android-nav-inset', Math.round(inset) + 'px');
      };

      apply();
      window.addEventListener('resize', apply, {passive:true});
      if(vv){
        vv.addEventListener('resize', apply, {passive:true});
        vv.addEventListener('scroll', apply, {passive:true});
      }
    }catch(e){}
  }

  function saveIp(ip){
    if(ip === ''){ localStorage.removeItem('hmk_ip'); return; }
    if(ip) localStorage.setItem('hmk_ip', ip);
  }
  function getIp(){ return localStorage.getItem('hmk_ip') || ''; }

  function normalizeHost(s){
    if(!s) return '';
    return String(s).trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'');
  }

  function candidateBases(){
    const out = [];
    const add = b => { if(b && !out.includes(b)) out.push(b); };
    const ip = normalizeHost(getIp());
    let currentHost = '';
    try{ currentHost = normalizeHost(location.hostname || ''); }catch(e){}
    const currentBase = (currentHost && /^(\d+\.){3}\d+$/.test(currentHost)) ? ('http://' + currentHost) : '';
    const ipBase = (ip && ip !== '192.168.4.1') ? ('http://' + ip) : '';

    add(currentBase);
    if(lastResolvedBase && lastResolvedBase !== currentBase) add(lastResolvedBase);
    if(ipBase && ipBase !== currentBase && ipBase !== lastResolvedBase) add(ipBase);
    add(AP_BASE);
    return out;
  }

  async function fetchWithTimeout(url, options, ms){
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), ms);
    try{
      return await fetch(url, Object.assign({}, options || {}, {signal: ctrl.signal}));
    } finally {
      clearTimeout(t);
    }
  }

  async function smartFetch(path, options, timeouts){
    const bases = candidateBases();
    let lastErr = null;
    for(const base of bases){
      const timeoutMs = base === AP_BASE
        ? ((timeouts && timeouts.ap) || 900)
        : ((timeouts && timeouts.ip) || 1800);
      try{
        const res = await fetchWithTimeout(base + path, options || {}, timeoutMs);
        if(!res.ok){
          lastErr = new Error('HTTP ' + res.status);
          continue;
        }
        try{
          const u = new URL(base);
          const host = u.hostname;
          if(host && host !== '192.168.4.1') saveIp(host);
        }catch(e){}
        lastResolvedBase = base;
        return {res, base};
      }catch(e){
        lastErr = e;
      }
    }
    throw lastErr || new Error('fetch failed');
  }

  function showMsg(text, isErr){
    const el = $('#msg');
    if(!el) return;
    el.textContent = text || '';
    el.className = 'msg ' + (isErr ? 'err' : 'ok');
  }

  const modeSel = $('#modeSel');
  const periodSel = $('#periodSel');
  const pwrSel = $('#pwrSel');
  const pwrCustomWrap = $('#pwrCustomWrap');
  const pwrCustomInp = $('#pwrCustomInp');
  const rateInp = $('#rateInp');
  const unitSel = $('#unitSel');
  const pickerMask = $('#pickerMask');
  const pickerTitle = $('#pickerTitle');
  const pickerList = $('#pickerList');
  const pickerClose = $('#pickerClose');
  const K_PWR = 'pl_pwr';
  const K_PWR_CUSTOM = 'pl_pwr_custom';
  const K_RATE = 'pl_rate';
  const K_UNIT = 'pl_unit';

  function pickerButtonFor(select){
    if(!select || !select.id) return null;
    return document.querySelector('.selBtn[data-select="' + select.id + '"]');
  }

  function selectLabel(select){
    if(!select || !select.id) return '選項';
    const label = document.querySelector('label[for="' + select.id + '"]');
    if(label) return String(label.textContent || '').trim() || '選項';
    if(select.id === 'unitSel') return '單位';
    return '選項';
  }

  function syncPickerButton(select){
    const btn = pickerButtonFor(select);
    if(!btn || !select) return;
    const text = btn.querySelector('.text');
    const op = select.options[select.selectedIndex] || null;
    if(text) text.textContent = op ? op.textContent : '--';
  }

  function syncAllPickerButtons(){
    document.querySelectorAll('.selBtn[data-select]').forEach(btn => {
      const id = btn.getAttribute('data-select');
      const select = id ? document.getElementById(id) : null;
      if(select) syncPickerButton(select);
    });
  }

  function closePicker(){
    if(!pickerMask) return;
    pickerMask.classList.remove('show');
    pickerMask.setAttribute('aria-hidden', 'true');
    document.querySelectorAll('.selBtn[data-select]').forEach(btn => btn.setAttribute('aria-expanded', 'false'));
    activePickerSelect = null;
  }

  function openPicker(select){
    if(!pickerMask || !pickerList || !pickerTitle || !select) return;
    activePickerSelect = select;
    pickerTitle.textContent = selectLabel(select);
    pickerList.innerHTML = '';

    Array.from(select.options).forEach(op => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'pickerItem' + (op.value === select.value ? ' active' : '');
      item.textContent = op.textContent;
      item.disabled = !!op.disabled;
      item.addEventListener('click', () => {
        if(select.value !== op.value){
          select.value = op.value;
          select.dispatchEvent(new Event('change', {bubbles:true}));
        }
        syncPickerButton(select);
        closePicker();
      });
      pickerList.appendChild(item);
    });

    pickerMask.classList.add('show');
    pickerMask.setAttribute('aria-hidden', 'false');
    document.querySelectorAll('.selBtn[data-select]').forEach(btn => {
      const expanded = (btn.getAttribute('data-select') === select.id) ? 'true' : 'false';
      btn.setAttribute('aria-expanded', expanded);
    });
  }

  function bindPickerUi(){
    document.querySelectorAll('.selBtn[data-select]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-select');
        const select = id ? document.getElementById(id) : null;
        if(!select) return;
        openPicker(select);
      });
    });

    pickerClose?.addEventListener('click', closePicker);
    pickerMask?.addEventListener('click', e => {
      if(e.target === pickerMask) closePicker();
    });
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape' && pickerMask?.classList.contains('show')) closePicker();
    });
  }

  function getPowerKw(){
    const mode = pwrSel ? pwrSel.value : '4';
    if(mode === 'custom'){
      const x = parseFloat(pwrCustomInp ? pwrCustomInp.value : '');
      return (isFinite(x) && x > 0) ? x : 4;
    }
    const k = parseFloat(mode);
    return (isFinite(k) && k > 0) ? k : 4;
  }

  function getRate(){
    const r = parseFloat(rateInp ? rateInp.value : '');
    return (isFinite(r) && r >= 0) ? r : 1.68;
  }

  function getUnit(){
    return (unitSel && unitSel.value) ? unitSel.value : 'h';
  }

  function updatePowerUi(){
    if(!pwrCustomWrap || !pwrSel) return;
    pwrCustomWrap.classList.toggle('show', pwrSel.value === 'custom');
  }

  function savePrefs(){
    try{
      if(pwrSel) localStorage.setItem(K_PWR, pwrSel.value || '4');
      if(pwrCustomInp) localStorage.setItem(K_PWR_CUSTOM, pwrCustomInp.value || '');
      if(rateInp) localStorage.setItem(K_RATE, rateInp.value || '1.68');
      if(unitSel) localStorage.setItem(K_UNIT, unitSel.value || 'h');
    }catch(e){}
  }

  function loadPrefs(){
    try{
      const p = localStorage.getItem(K_PWR);
      const pc = localStorage.getItem(K_PWR_CUSTOM);
      const r = localStorage.getItem(K_RATE);
      const u = localStorage.getItem(K_UNIT);
      if(p && pwrSel) pwrSel.value = p;
      if(pc && pwrCustomInp) pwrCustomInp.value = pc;
      if(r && rateInp) rateInp.value = r;
      if(u && unitSel) unitSel.value = u;
    }catch(e){}
    updatePowerUi();
    syncAllPickerButtons();
  }

  function fmtNumber(n){
    return Number(n || 0).toLocaleString('zh-TW', {maximumFractionDigits:1});
  }

  function ymToLabel(ym){
    const y = Math.floor(ym / 12);
    const m = (ym % 12) + 1;
    return y + '年' + m + '月';
  }

  function getDaysInMonth(year, month){
    return new Date(year, month, 0).getDate();
  }

  function getValidMonthYms(g){
    const out = [];
    if(!g || !Array.isArray(g.months)) return out;
    const baseYM = Number(g.baseYM || 0);
    for(let i = 0; i < g.months.length; i++){
      out.push(baseYM + i);
    }
    return out;
  }

  function getMonthSec(g, ym){
    const idx = ym - Number(g.baseYM || 0);
    if(idx < 0 || !Array.isArray(g.months) || idx >= g.months.length) return 0;
    return Number(g.months[idx] || 0);
  }

  function getDaySecMap(g, ym, day){
    const key = String(ym);
    const arr = g && g.daysByYM && Array.isArray(g.daysByYM[key]) ? g.daysByYM[key] : [];
    return Number(arr[day - 1] || 0);
  }

  function renderPeriods(g){
    const mode = modeSel ? modeSel.value : 'month';
    const sel = periodSel;
    if(!sel) return;
    if(activePickerSelect === sel) closePicker();
    sel.innerHTML = '';

    if(mode === 'month' || mode === 'day'){
      const yms = getValidMonthYms(g).reverse();
      yms.forEach(ym => {
        const op = document.createElement('option');
        op.value = String(ym);
        op.textContent = ymToLabel(ym);
        sel.appendChild(op);
      });
      if(!sel.value && yms.length) sel.value = String(yms[0]);
      syncPickerButton(sel);
      return;
    }

    const years = [];
    getValidMonthYms(g).forEach(ym => {
      const y = Math.floor(ym / 12);
      if(!years.includes(y)) years.push(y);
    });
    years.sort((a,b)=> b - a).forEach(y => {
      const op = document.createElement('option');
      op.value = String(y);
      op.textContent = y + '年';
      sel.appendChild(op);
    });
    if(!sel.value && years.length) sel.value = String(years[0]);
    syncPickerButton(sel);
  }

  function secToHours(sec){ return (Number(sec || 0) / 3600); }
  function secToKwh(sec){ return secToHours(sec) * getPowerKw(); }
  function secToCost(sec){ return secToKwh(sec) * getRate(); }

  function valueByUnit(sec){
    const u = getUnit();
    if(u === 'k') return secToKwh(sec);
    if(u === 'c') return secToCost(sec);
    return secToHours(sec);
  }

  function unitText(){
    const u = getUnit();
    if(u === 'k') return '度';
    if(u === 'c') return '元';
    return '小時';
  }

  function prevYearMonthSec(g, ym){
    return getMonthSec(g, ym - 12);
  }

  function prevYearDaySec(g, ym, day){
    return getDaySecMap(g, ym - 12, day);
  }

  function yearMonthSec(g, year, month){
    const ym = year * 12 + (month - 1);
    return getMonthSec(g, ym);
  }

  function yearTotalSec(g, year){
    let s = 0;
    for(let m = 1; m <= 12; m++) s += yearMonthSec(g, year, m);
    return s;
  }

  function diffPct(curSec, prevSec){
    const c = Number(curSec || 0);
    const p = Number(prevSec || 0);
    if(p <= 0) return null;
    return ((c - p) / p) * 100;
  }

  function renderRows(g){
    const mode = modeSel ? modeSel.value : 'month';
    const period = periodSel ? periodSel.value : '';
    const rows = $('#rows');
    rows.innerHTML = '';

    const addRow = (label, curSec, prevSec) => {
      const tr = document.createElement('tr');
      const curV = valueByUnit(curSec);
      const prevV = valueByUnit(prevSec);
      const pct = diffPct(curSec, prevSec);
      const pctText = (pct == null) ? '--' : ((pct > 0 ? '+' : '') + pct.toFixed(1) + '%');
      const pctClass = (pct == null) ? '' : (pct >= 0 ? 'pos' : 'neg');

      tr.innerHTML =
        '<td>' + label + '</td>' +
        '<td>' + fmtNumber(curV) + '</td>' +
        '<td>' + (prevSec > 0 ? fmtNumber(prevV) : '--') + '</td>' +
        '<td class="' + pctClass + '">' + pctText + '</td>';
      rows.appendChild(tr);
      return {curSec, prevSec};
    };

    let sumCurSec = 0;
    let sumPrevSec = 0;

    if(mode === 'month'){
      const ym = Number(period || 0);
      const sec = getMonthSec(g, ym);
      const prev = prevYearMonthSec(g, ym);
      const r = addRow(ymToLabel(ym), sec, prev);
      sumCurSec += r.curSec;
      sumPrevSec += r.prevSec;
      $('#tableTitle').textContent = '月份明細';
      $('#metaText').textContent = '單位: ' + unitText();
    } else if(mode === 'day'){
      const ym = Number(period || 0);
      const y = Math.floor(ym / 12);
      const m = (ym % 12) + 1;
      const days = getDaysInMonth(y, m);
      for(let d = days; d >= 1; d--){
        const sec = getDaySecMap(g, ym, d);
        const prev = prevYearDaySec(g, ym, d);
        const r = addRow(String(d) + '日', sec, prev);
        sumCurSec += r.curSec;
        sumPrevSec += r.prevSec;
      }
      $('#tableTitle').textContent = ymToLabel(ym) + ' 日明細';
      $('#metaText').textContent = '單位: ' + unitText();
    } else {
      const y = Number(period || 0);
      const years = [];
      getValidMonthYms(g).forEach(ym => {
        const yy = Math.floor(ym / 12);
        if(!years.includes(yy)) years.push(yy);
      });
      years.sort((a,b)=> b - a).forEach(yy => {
        const sec = yearTotalSec(g, yy);
        const prev = yearTotalSec(g, yy - 1);
        const r = addRow(String(yy) + '年', sec, prev);
        if(yy === y){
          sumCurSec = r.curSec;
          sumPrevSec = r.prevSec;
        }
      });
      $('#tableTitle').textContent = y + ' 年明細';
      $('#metaText').textContent = '單位: ' + unitText();
    }

    $('#hoursVal').textContent = fmtNumber(secToHours(sumCurSec));
    $('#kwhVal').textContent = fmtNumber(secToKwh(sumCurSec));
    $('#costVal').textContent = fmtNumber(secToCost(sumCurSec));
  }

  async function loadData(){
    showMsg('讀取用電記錄中...', false);
    try{
      const got = await smartFetch('/api/powerlog?_=' + Date.now(), {cache:'no-store'}, {ap:900, ip:1800});
      const g = await got.res.json().catch(()=>null);
      if(!g || !g.ok) throw new Error('資料格式錯誤');

      if(!Array.isArray(g.months)){
        if(Array.isArray(g.monthSec)) g.months = g.monthSec;
        else if(Array.isArray(g.monthSecs)) g.months = g.monthSecs;
      }

      powerData = g;
      renderPeriods(g);
      renderRows(g);
      showMsg('電費明細已更新', false);
    }catch(e){
      showMsg('讀取失敗：' + (e && e.message ? e.message : e), true);
    }
  }

  function goStatusFresh(){
    const v = encodeURIComponent(String(window.HMK_VERSION || '13159'));
    location.href = './status.html?v=' + v + '&_t=' + encodeURIComponent(String(Date.now()));
  }

  $('#backBtn')?.addEventListener('click', goStatusFresh);

  modeSel?.addEventListener('change', ()=>{
    syncPickerButton(modeSel);
    if(!powerData) return;
    renderPeriods(powerData);
    renderRows(powerData);
  });

  periodSel?.addEventListener('change', ()=>{
    syncPickerButton(periodSel);
    if(!powerData) return;
    renderRows(powerData);
  });

  pwrSel?.addEventListener('change', ()=>{
    syncPickerButton(pwrSel);
    updatePowerUi();
    savePrefs();
    if(powerData) renderRows(powerData);
  });

  pwrCustomInp?.addEventListener('input', ()=>{
    savePrefs();
    if(powerData) renderRows(powerData);
  });

  rateInp?.addEventListener('input', ()=>{
    savePrefs();
    if(powerData) renderRows(powerData);
  });

  unitSel?.addEventListener('change', ()=>{
    syncPickerButton(unitSel);
    savePrefs();
    if(powerData) renderRows(powerData);
  });

  bindPickerUi();
  loadPrefs();
  syncAllPickerButtons();
  setupAndroidBottomInset();
  loadData();
})();
</script>
</body>
</html>
