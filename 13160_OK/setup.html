<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2aa6bf">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<title>HMK 連線狀態</title>
<style>
  :root{
    --top:#279bb3;
    --top2:#32acc5;
    --line:rgba(255,255,255,.45);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:var(--top);
  }
  body{color:#fff}
  .app{
    min-height:100dvh;
    background:linear-gradient(180deg,var(--top2) 0 32%,#f3f3f1 32% 100%);
  }
  .top{
    max-width:430px;
    margin:0 auto;
    padding:env(safe-area-inset-top,0) 0 0;
  }
  .header{
    height:66px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-bottom:1px solid var(--line);
    padding:0 16px;
  }
  .backBtn{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    align-items:center;
    gap:6px;
    border:0;
    background:transparent;
    color:#e8f6fb;
    font-size:16px;
    padding:8px 6px;
    cursor:pointer;
  }
  .backBtn svg{
    width:26px;
    height:26px;
    stroke:currentColor;
    fill:none;
    stroke-width:2.2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .brand{font-size:40px;font-weight:900;letter-spacing:.02em;line-height:1}

  .frameHost{
    max-width:430px;
    margin:0 auto;
    height:calc(100dvh - env(safe-area-inset-top,0) - 66px);
    position:relative;
    background:#fff;
    overflow:hidden;
  }
  .nativeFrame{
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#fff;
  }
  .loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    color:#5f8b95;
    font-size:14px;
    z-index:2;
  }
  .frameHost.ready .loading{display:none}

  @media (min-width:480px){
    .app{display:flex;flex-direction:column;align-items:center}
    .top,.frameHost{width:430px}
    .top{border-top-left-radius:18px;border-top-right-radius:18px;margin-top:10px}
    .frameHost{border-bottom-left-radius:18px;border-bottom-right-radius:18px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="header">
      <button id="backBtn" class="backBtn" type="button" aria-label="返回首頁">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
        <span>連線狀態</span>
      </button>
      <div class="brand" aria-label="HMK"><img src="./HMK_logo_text.png" alt="HMK" style="height:80px;width:auto;display:block;object-fit:contain"></div>
    </div>
  </div>

  <div id="frameHost" class="frameHost">
    <div class="loading">載入設備設定頁中...</div>
    <iframe id="nativeFrame" class="nativeFrame" title="設備設定"></iframe>
  </div>
</div>

<script>
(function(){
  const AP_BASE = 'http://192.168.4.1';
  let lastResolvedBase = '';

  const $ = s => document.querySelector(s);

  function saveIp(ip){
    if(ip === '') { localStorage.removeItem('hmk_ip'); return; }
    if(ip) localStorage.setItem('hmk_ip', ip);
  }

  function getIp(){ return localStorage.getItem('hmk_ip') || ''; }

  function normalizeHost(s){
    if(!s) return '';
    return String(s).trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'');
  }

  function candidateBases(){
    const out = [];
    const add = b => { if(b && !out.includes(b)) out.push(b); };

    const ip = normalizeHost(getIp());
    let currentHost = '';
    try{ currentHost = normalizeHost(location.hostname || ''); }catch(e){}

    const currentBase = (currentHost && /^(\d+\.){3}\d+$/.test(currentHost)) ? ('http://' + currentHost) : '';
    const ipBase = (ip && ip !== '192.168.4.1') ? ('http://' + ip) : '';

    add(currentBase);
    if(lastResolvedBase && lastResolvedBase !== currentBase) add(lastResolvedBase);
    if(ipBase && ipBase !== currentBase && ipBase !== lastResolvedBase) add(ipBase);
    add(AP_BASE);
    return out;
  }

  async function fetchWithTimeout(url, options, ms){
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try{
      return await fetch(url, Object.assign({}, options || {}, { signal: ctrl.signal }));
    } finally {
      clearTimeout(t);
    }
  }

  async function resolveWorkingBase(){
    const bases = candidateBases();
    for(const base of bases){
      const timeoutMs = (base === AP_BASE) ? 700 : 1000;
      try{
        const r = await fetchWithTimeout(base + '/ping?ts=' + Date.now(), { cache:'no-store' }, timeoutMs);
        if(!r.ok) continue;
        lastResolvedBase = base;
        try{
          const u = new URL(base);
          if(u.hostname && u.hostname !== '192.168.4.1') saveIp(u.hostname);
        }catch(e){}
        return base;
      }catch(e){}
    }
    return AP_BASE;
  }

  async function openNativeSetup(){
    const host = $('#frameHost');
    const frame = $('#nativeFrame');
    if(!host || !frame) return;

    host.classList.remove('ready');
    let loaded = false;
    frame.onload = () => {
      loaded = true;
      host.classList.add('ready');
    };

    // 先秒開 AP 內頁，避免等待 ping 探測造成白屏感。
    let activeBase = AP_BASE;
    frame.src = activeBase + '/setup?ts=' + Date.now();

    // 背景探測可用 base，若找到更好的再切換一次。
    resolveWorkingBase().then((resolvedBase) => {
      if(!resolvedBase || resolvedBase === activeBase) return;
      activeBase = resolvedBase;
      if(loaded) return;
      frame.src = activeBase + '/setup?ts=' + Date.now();
    }).catch(() => {});

    // 若網路慢導致沒 onload，再補一次重載。
    setTimeout(() => {
      if(host.classList.contains('ready')) return;
      frame.src = activeBase + '/setup?retry=' + Date.now();
    }, 1200);
  }

  $('#backBtn')?.addEventListener('click', () => {
    location.href = './index.html';
  });

  window.addEventListener('message', (e) => {
    const s = String(e.data || '');
    const origin = String(e.origin || '');
    const originAllowed = (origin === window.origin) || /^https?:\/\/192\.168\.\d+\.\d+(?::\d+)?$/.test(origin);
    if(!originAllowed) return;

    const m = s.match(/^saveip:([\d.]*)$/);
    if(m){
      const ip = m[1] || '';
      if(ip) saveIp(ip);
      setTimeout(() => { location.href = './index.html'; }, 650);
    }
  });

  openNativeSetup();
})();
</script>
</body>
</html>

<body>
<div class="app">
  <div class="top">
    <div class="header">
      <button id="backBtn" class="backBtn" type="button" aria-label="返回首頁">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
        <span>連線狀態</span>
      </button>
      <div class="brand" aria-label="HMK">HMK</div>
    </div>

    <div class="panel">
      <div id="pageTitle" class="title">Wi-Fi 設定</div>
      <p id="pageSubtitle" class="subtitle">請依序完成步驟 1、2、3</p>

      <form id="wifiForm" class="formCard">
        <label class="stepLabel">1. 選擇您的 Wi-Fi 名稱</label>
        <select id="ssidSelect" name="ssid"></select>

        <label class="stepLabel">2. 輸入您的 Wi-Fi 密碼</label>
        <input id="pass" name="pass" type="password" placeholder="輸入密碼">

        <button class="saveBtn" type="submit">3. 儲存密碼完成設定</button>
      </form>

      <div id="embedWrap" class="embedWrap">
        <div id="embedCard" class="embedCard">
          <div id="embedLoading" class="embedLoading">載入設備設定頁中...</div>
          <iframe id="boardSetupFrame" class="embedFrame" title="設備 Wi-Fi 設定"></iframe>
        </div>
      </div>

      <div id="progWrap">
        <div id="bar"><i id="barIn"></i></div>
        <div id="topline">
          <div id="pct">0%</div>
          <div id="sec">0.0 秒</div>
        </div>
        <div class="hint">配置 IP 期間約 30 秒，請保持連線至 HMK-Setup...</div>
      </div>

      <p id="msg"></p>
    </div>
  </div>
</div>

<script>
(function(){
  const AP_BASE = 'http://192.168.4.1';
  let lastResolvedBase = '';

  const $ = s => document.querySelector(s);

  function saveIp(ip){
    if (ip === '') { localStorage.removeItem('hmk_ip'); return; }
    if (ip) localStorage.setItem('hmk_ip', ip);
  }

  function getIp(){
    return localStorage.getItem('hmk_ip') || '';
  }

  function normalizeHost(s){
    if(!s) return '';
    return String(s).trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'');
  }

  function candidateBases(){
    const out = [];
    const add = b => { if(b && !out.includes(b)) out.push(b); };

    const ip = normalizeHost(getIp());
    let currentHost = '';
    try{ currentHost = normalizeHost(location.hostname || ''); }catch(e){}

    const currentBase = (currentHost && /^(\d+\.){3}\d+$/.test(currentHost)) ? ('http://' + currentHost) : '';
    const ipBase = (ip && ip !== '192.168.4.1') ? ('http://' + ip) : '';

    add(currentBase);
    if(lastResolvedBase && lastResolvedBase !== currentBase) add(lastResolvedBase);
    if(ipBase && ipBase !== currentBase && ipBase !== lastResolvedBase) add(ipBase);
    add(AP_BASE);

    return out;
  }

  async function fetchWithTimeout(url, options, ms){
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try{
      return await fetch(url, Object.assign({}, options || {}, { signal: ctrl.signal }));
    } finally {
      clearTimeout(t);
    }
  }

  async function smartFetch(path, options, timeouts){
    const bases = candidateBases();
    let lastErr = null;

    for(const base of bases){
      const timeoutMs = base === AP_BASE ? ((timeouts && timeouts.ap) || 1200) : ((timeouts && timeouts.ip) || 2200);
      try{
        const res = await fetchWithTimeout(base + path, options || {}, timeoutMs);
        if(!res.ok){
          lastErr = new Error('HTTP ' + res.status);
          continue;
        }
        try{
          const u = new URL(base + path);
          if(u.hostname && u.hostname !== '192.168.4.1') saveIp(u.hostname);
        }catch(e){}
        lastResolvedBase = base;
        return {res, base};
      }catch(e){
        lastErr = e;
      }
    }

    throw lastErr || new Error('device offline');
  }

  function showMsg(text, isErr){
    const m = $('#msg');
    if(!m) return;
    m.textContent = text || '';
    m.className = isErr ? 'err' : (text ? 'ok' : '');
  }

  function isApModeLikely(){
    const host = normalizeHost(location.hostname || '');
    const ip = normalizeHost(getIp());
    if(host === '192.168.4.1') return true;
    if(lastResolvedBase === AP_BASE) return true;
    if(!ip || ip === '192.168.4.1') return true;
    return false;
  }

  function activateEmbeddedSetup(base){
    const form = $('#wifiForm');
    const wrap = $('#embedWrap');
    const frame = $('#boardSetupFrame');
    const card = $('#embedCard');
    const title = $('#pageTitle');
    const subtitle = $('#pageSubtitle');
    if(!wrap || !frame) return;

    // 切到內嵌模式時，隱藏外層標題，避免雙層 UI 重疊感。
    if(title) title.style.display = 'none';
    if(subtitle) subtitle.style.display = 'none';
    if(form) form.style.display = 'none';
    wrap.style.display = 'block';

    if(card) card.classList.remove('ready');
    const target = (base || AP_BASE) + '/setup-mini';
    let loaded = false;
    const onLoad = () => {
      loaded = true;
      if(card) card.classList.add('ready');
      frame.removeEventListener('load', onLoad);
    };
    frame.addEventListener('load', onLoad);

    const bust = (target.indexOf('?') >= 0 ? '&' : '?') + '_=' + Date.now();
    frame.src = target + bust;

    // 若首輪未成功載入，快速重試一次，避免偶發白屏。
    setTimeout(() => {
      if(loaded) return;
      frame.src = target + ((target.indexOf('?') >= 0 ? '&' : '?') + '_retry=' + Date.now());
    }, 1600);

    setTimeout(() => {
      if(loaded) return;
      showMsg('設備頁載入較慢，請稍候。', false);
    }, 3200);

    showMsg('已切換為內嵌設定模式。', false);
  }

  function setPct(p){
    p = Math.round(Math.max(0, Math.min(100, p)));
    const barIn = $('#barIn'); if(barIn) barIn.style.width = p + '%';
    const pct = $('#pct'); if(pct) pct.textContent = p + '%';
  }

  let t0 = 0;
  let tTimer = null;
  let animTimer = null;
  const EST_MS = 35000;

  function startProgress(){
    const pw = $('#progWrap');
    if(pw) pw.style.display = 'block';
    setPct(0);
    t0 = performance.now();

    clearInterval(tTimer);
    tTimer = setInterval(() => {
      const s = (performance.now() - t0) / 1000;
      const sec = $('#sec');
      if(sec) sec.textContent = s.toFixed(1) + ' 秒';
    }, 100);

    clearInterval(animTimer);
    animTimer = setInterval(() => {
      const el = performance.now() - t0;
      const p = Math.min(95, (el / EST_MS) * 95);
      setPct(p);
    }, 120);
  }

  function stopProgressSuccess(){ clearInterval(animTimer); setPct(100); clearInterval(tTimer); }
  function stopProgressFail(){ clearInterval(animTimer); clearInterval(tTimer); setPct(100); }

  async function quickCheck(){
    try{
      await smartFetch('/ping', { method:'GET', cache:'no-store' }, { ap: 1200, ip: 1800 });
      return true;
    }catch(e){
      return false;
    }
  }

  async function scan(){
    const sel = $('#ssidSelect');
    if(sel) sel.innerHTML = '<option>掃描中...</option>';
    try{
      const {res} = await smartFetch('/scan', { cache:'no-store' }, { ap: 1200, ip: 2500 });
      const t = await res.text();
      if(sel) sel.innerHTML = t;
      const form = $('#wifiForm');
      const wrap = $('#embedWrap');
      const card = $('#embedCard');
      const title = $('#pageTitle');
      const subtitle = $('#pageSubtitle');
      if(form) form.style.display = '';
      if(wrap) wrap.style.display = 'none';
      if(card) card.classList.remove('ready');
      if(title) title.style.display = '';
      if(subtitle) subtitle.style.display = '';
      showMsg('Wi-Fi 清單已更新', false);
    }catch(e){
      if(sel) sel.innerHTML = '<option>無法取得清單</option>';
      if(isApModeLikely()){
        // AP 模式下固定走 192.168.4.1 內嵌頁，避免出現外跳網址列。
        activateEmbeddedSetup(AP_BASE);
      }else{
        activateEmbeddedSetup(lastResolvedBase || AP_BASE);
      }
    }
  }

  async function doSave(ssid, pass){
    const form = new FormData();
    form.append('ssid', ssid);
    form.append('pass', pass);
    const {res} = await smartFetch('/savewifi', { method:'POST', body: form }, { ap: 65000, ip: 65000 });
    return await res.text();
  }

  async function onSubmit(ev){
    ev.preventDefault();
    const ssid = $('#ssidSelect')?.value || '';
    const pass = $('#pass')?.value || '';

    showMsg('儲存中...', false);

    const ok = await quickCheck();
    if(!ok){
      alert('偵測到 HMK-Setup 連線品質偏弱，或手機正在進行 Wi-Fi 驗證。\n\n請靠近設備，並確認手機仍在 HMK-Setup 後再試一次。');
      return;
    }

    const MAX_TRIES = 3;
    let attempt = 0;

    while(attempt < MAX_TRIES){
      attempt++;
      startProgress();

      try{
        await doSave(ssid, pass);
        stopProgressSuccess();
        showMsg('儲存完成，正在自動跳回首頁...', false);
        setTimeout(() => {
          location.href = './index.html';
        }, 900);
        return;
      }catch(e){
        if(attempt >= MAX_TRIES){
          stopProgressFail();
          showMsg('Wi-Fi 設定傳送失敗或逾時，請確認手機仍連到 HMK-Setup。', true);
          return;
        }
      }
    }
  }

  $('#backBtn')?.addEventListener('click', () => {
    location.href = './index.html';
  });

  window.addEventListener('message', (e) => {
    const s = String(e.data || '');
    const origin = String(e.origin || '');
    const originAllowed = (origin === window.origin) || /^https?:\/\/192\.168\.\d+\.\d+(?::\d+)?$/.test(origin);
    if(!originAllowed) return;

    const m = s.match(/^saveip:([\d.]*)$/);
    if(m){
      const ip = m[1] || '';
      if(ip){
        saveIp(ip);
      }
      showMsg('設定完成，正在返回首頁...', false);
      setTimeout(() => {
        location.href = './index.html';
      }, 700);
    }
  });

  $('#wifiForm')?.addEventListener('submit', onSubmit);
  scan();
})();
</script>
</body>
</html>
