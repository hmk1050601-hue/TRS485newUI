 HMK PWA Shell · v11 首頁新樣式
 依首頁需求改版：
 1. 首頁顯示名稱可編輯（localStorage）
 2. 連線狀態顯示 AP / 家用網路
 3. 首頁顯示目前模式（自動 / 定時 / 關閉）
 4. 首頁電費累計改顯示當月
 5. 顯示設定水溫
 6. 顯示實際水溫
 7. 遙控器 → 控制頁
 8. 時間設定 → 排程設定
 9. 產品狀態 → 設備狀態
10. 連線狀態 → Wi-Fi 設定頁
11. 聯繫客服 → mailto:service@homemark.com.tw
-->

  <script>
  (function(){
    function applyVersionUi(appName, ver){
      document.querySelectorAll('.hmk-version').forEach(e => e.textContent = ver || '');
      document.title = (appName || 'HMK 無線系統') + ' · Home';
      const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if(appleTitle) appleTitle.setAttribute('content', appName || 'HMK');
    }

    try{
      const storedName = localStorage.getItem('hmk_pwa_name') || '';
      const storedVer  = localStorage.getItem('hmk_pwa_version') || '';
      if(storedName || storedVer){
        document.addEventListener('DOMContentLoaded', function(){
          applyVersionUi(storedName, storedVer);
        });
      }
    }catch(e){}

    const s = document.createElement('script');
    s.src = './version.js?v=' + Date.now();
    s.async = true;
    s.onload = function(){
      const appName = window.HMK_APP_NAME || '';
      const ver = window.HMK_VERSION || '';
      try{
        localStorage.setItem('hmk_pwa_name', appName || '');
        localStorage.setItem('hmk_pwa_version', ver || '');
      }catch(e){}
      applyVersionUi(appName, ver);
    };
    s.onerror = function(){ console.warn('version.js load failed'); };
    document.head.appendChild(s);
  })();
  </script>

  <script>
  const $ = s => document.querySelector(s);
  const isStandalone = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  let deferredPrompt = null;
  let lastResolvedBase = '';
  let homeTimer = null;
  const AP_BASE = 'http://192.168.4.1';
  const LAST_VIEW_KEY = 'hmk_last_view_v1';
  const LAST_VIEW_TS_KEY = 'hmk_last_view_ts_v1';
  const LAST_VIEW_MAX_AGE_MS = 1000 * 60 * 30;
  const BOARD_VIEW_PREFIX = 'board:';
  let restoringLastView = false;

  function saveIp(ip){
    if (ip === '') { localStorage.removeItem('hmk_ip'); return; }
    if (ip) localStorage.setItem('hmk_ip', ip);
  }
  function getIp(){ return localStorage.getItem('hmk_ip') || ''; }

  function rememberShellView(view){
    try{
      localStorage.setItem(LAST_VIEW_KEY, String(view || 'index'));
      localStorage.setItem(LAST_VIEW_TS_KEY, String(Date.now()));
    }catch(e){}
  }

  function getRememberedShellView(){
    try{
      const view = localStorage.getItem(LAST_VIEW_KEY) || 'index';
      const ts = Number(localStorage.getItem(LAST_VIEW_TS_KEY) || '0');
      if(!view || !isFinite(ts)) return 'index';
      if((Date.now() - ts) > LAST_VIEW_MAX_AGE_MS) return 'index';
      return view;
    }catch(e){
      return 'index';
    }
  }

  function setHomeView(){
    if(restoringLastView) return;
    rememberShellView('index');
  }

  function normalizeBoardPath(path){
    let out = String(path || '/').trim();
    if(!out) return '/';
    if(/^https?:\/\//i.test(out)){
      try{
        const u = new URL(out);
        out = (u.pathname || '/') + (u.search || '');
      }catch(e){
        return '/';
      }
    }
    out = out.replace(/^\.\//, '/');
    if(!out.startsWith('/')) out = '/' + out;
    return out;
  }

  function isFrameVisible(){
    const wrap = $('#frameWrap');
    if(!wrap) return false;
    return getComputedStyle(wrap).display !== 'none';
  }

  function openShellFrame(url){
    stopHomePolling();
    setHomeView();
    $('#frameWrap').style.display = 'block';
    $('#hmkFrame').src = url;
  }

  async function restoreRememberedView(){
    const view = getRememberedShellView();
    if(!view || view === 'index') return false;

    restoringLastView = true;
    try{
      if(view.startsWith(BOARD_VIEW_PREFIX)){
        const path = normalizeBoardPath(view.slice(BOARD_VIEW_PREFIX.length));
        if(path === '/'){
          rememberShellView('remote');
          location.replace('./remote.html');
          return true;
        }
      }
      if(view === 'remote'){
        location.replace('./remote.html');
        return true;
      }
      if(view === 'status'){
        location.replace('./status.html');
        return true;
      }
    } finally {
      restoringLastView = false;
    }

    setHomeView();
    return false;
  }

  const HOTSPOT_NAME_KEY = 'hmk_hotspot_name_display';

  function getHotspotName(){
    return (localStorage.getItem(HOTSPOT_NAME_KEY) || '').trim() || 'HMK-Setup';
  }
  function renderHotspotName(){
    const el = $('#hotspotName');
    if (el) el.textContent = getHotspotName();
  }

  function normalizeHost(s){
    if(!s) return '';
    s = String(s).trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'');
    return s;
  }

  function candidateBases(){
    const out = [];
    const add = (b)=>{ if(b && !out.includes(b)) out.push(b); };

    let currentHost = '';
    try{
      currentHost = normalizeHost(location.hostname || '');
    }catch(e){}

    const currentBase = (/^(\d+\.){3}\d+$/.test(currentHost)) ? ('http://' + currentHost) : '';
    const ip = normalizeHost(getIp());
    const ipBase = (ip && ip !== '192.168.4.1') ? ('http://' + ip) : '';

    add(currentBase);
    if (lastResolvedBase && lastResolvedBase !== currentBase) add(lastResolvedBase);
    if (ipBase && ipBase !== currentBase && ipBase !== lastResolvedBase) add(ipBase);
    add(AP_BASE);

    return out;
  }

  async function fetchWithTimeout(url, options, ms){
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), ms);
    try{
      return await fetch(url, Object.assign({}, options || {}, {signal: ctrl.signal}));
    } finally {
      clearTimeout(t);
    }
  }

  function rememberBase(base){
    if(!base) return;
    lastResolvedBase = base;
    try{
      const u = new URL(base);
      const host = u.hostname;
      if(host && host !== '192.168.4.1'){
        saveIp(host);
      }
    }catch(e){}
  }

  async function probeBase(base, ms){
    try{
      // v1305：首頁探測改回與標準版相同的 /status 方式，避免 AP 下過度嚴苛的 probe 導致判不到設備。
      const res = await fetchWithTimeout(base + '/status?_=' + Date.now(), {cache:'no-store'}, ms);
      if(!res || !res.ok) return false;
      rememberBase(base);
      return true;
    }catch(e){
      return false;
    }
  }

  async function resolveWorkingBase(){
    const bases = candidateBases();
    for(const base of bases){
      // v1305：AP timeout 恢復到標準版等級，避免 AP 模式下首頁探測過短而判失敗。
      const ms = (base === AP_BASE) ? 900 : 700;
      if(await probeBase(base, ms)) return base;
    }
    return '';
  }

  async function fetchFromBase(base, path, options, ms){
    if(!base) throw new Error('no base');
    const timeoutMs = (ms != null) ? ms : ((base === AP_BASE) ? 900 : 1600);
    const res = await fetchWithTimeout(base + path, options || {}, timeoutMs);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    rememberBase(base);
    return {res, base};
  }

  async function smartFetch(path, options){
    const base = await resolveWorkingBase();
    if(!base) throw new Error('fetch failed');
    return fetchFromBase(base, path, options);
  }

  function setNetworkTextByBase(base){
    const el = $('#networkText');
    if(!el) return;
    if(base === AP_BASE || location.hostname === '192.168.4.1'){
      el.textContent = '連線產品中';
    }else if(base){
      el.textContent = '連線家用網路中';
    }else{
      el.textContent = '離線中';
    }
  }

  function modeText(m){
    if (Number(m) === 1) return '自動';
    if (Number(m) === 2) return '定時';
    if (Number(m) === 0) return '關閉';
    return '--';
  }
  function isHeatingOn(heat, heatValid){
    if (heatValid != null && Number(heatValid) === 0) return false;
    if (heat === true) return true;
    if (typeof heat === 'string'){
      const s = heat.trim().toLowerCase();
      if (s === '1' || s === 'true' || s === 'on') return true;
      if (s === '0' || s === 'false' || s === 'off') return false;
    }
    return Number(heat) === 1;
  }

  function modeIcon(m, heat, heatValid){
    if (Number(m) === 0) return '💤';
    if (Number(m) === 1 || Number(m) === 2){
      return isHeatingOn(heat, heatValid) ? '🔥' : '💤';
    }
    return '◌';
  }

  function setModeUi(m, heat, heatValid){
    $('#modeValue').textContent = modeText(m);
    $('#modeIcon').textContent = modeIcon(m, heat, heatValid);
  }

  function setTempText(id, v){
    const el = document.getElementById(id);
    if(!el) return;
    const n = Number(v);
    el.innerHTML = (isFinite(n) ? Math.round(n) : '--') + '<span class="unit">°C</span>';
  }

  function fmtMoney(n){
    const x = Number(n);
    if(!isFinite(x)) return '--';
    if (Math.abs(x) >= 100) return String(Math.round(x));
    return x.toFixed(1);
  }

  function getPowerKw(){
    const mode = localStorage.getItem('pl_pwr') || '';
    if (mode === 'custom'){
      const x = parseFloat(localStorage.getItem('pl_pwr_custom') || '');
      return (isFinite(x) && x > 0) ? x : 4;
    }
    const k = parseFloat(mode);
    return (isFinite(k) && k > 0) ? k : 4;
  }

  function getRate(){
    const r = parseFloat(localStorage.getItem('pl_rate') || '');
    return (isFinite(r) && r >= 0) ? r : 1.68;
  }

  function getCurrentMonthSec(g){
    if(!g) return 0;
    const months = Array.isArray(g.months) ? g.months :
                  (Array.isArray(g.monthSec) ? g.monthSec :
                  (Array.isArray(g.monthSecs) ? g.monthSecs : []));
    if(!months.length) return 0;

    if (g.validDate && isFinite(Number(g.baseYM))){
      const ym = Number(g.y || 0) * 12 + (Number(g.mo || 1) - 1);
      const idx = ym - Number(g.baseYM);
      if (idx >= 0 && idx < months.length){
        return Number(months[idx] || 0);
      }
    }
    return Number(months[months.length - 1] || 0);
  }

  function setCostUi(sec){
    const h = (Number(sec) || 0) / 3600;
    const cost = h * getPowerKw() * getRate();
    $('#costValue').textContent = fmtMoney(cost);
  }

  const COST_CACHE_KEY = 'hmk_cost_month_sec_v1';
  function readCostCacheSec(){
    try{
      const raw = localStorage.getItem(COST_CACHE_KEY);
      if(raw == null) return null;
      const n = Number(raw);
      return isFinite(n) && n >= 0 ? n : null;
    }catch(e){
      return null;
    }
  }

  function writeCostCacheSec(sec){
    try{
      const n = Number(sec);
      if(!isFinite(n) || n < 0) return;
      localStorage.setItem(COST_CACHE_KEY, String(n));
    }catch(e){}
  }

  function primeCostUiFromCache(){
    const sec = readCostCacheSec();
    if(sec != null) setCostUi(sec);
  }

  async function autoFetchIpFromAp(){
    if(getIp()) return;
    try{
      const controller = new AbortController();
      const t = setTimeout(()=>controller.abort(), 1200);
      const res = await fetch(AP_BASE + '/api/myip', {cache:'no-store', signal:controller.signal});
      clearTimeout(t);
      if(!res.ok) return;
      const j = await res.json().catch(()=>null);
      if(!j || !j.ok || !j.ip) return;
      saveIp(String(j.ip).trim());
    }catch(e){
      console.warn('autoFetchIpFromAp failed:', e);
    }
  }

  async function autoSyncTimeOnce(){
    const bases = candidateBases();
    if(!bases.length) return;

    try{
      const d = new Date();
      const h = d.getHours();
      const m = d.getMinutes();
      let wd = d.getDay();
      wd = (wd === 0) ? 7 : wd;
      const y = d.getFullYear();
      const mo = d.getMonth() + 1;
      const da = d.getDate();

      for(const base of bases){
        try{
          await fetchWithTimeout(base + '/api/time', {
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:
              'h=' + encodeURIComponent(h) +
              '&m=' + encodeURIComponent(m) +
              '&wd=' + encodeURIComponent(wd) +
              '&y=' + encodeURIComponent(y) +
              '&mo=' + encodeURIComponent(mo) +
              '&d=' + encodeURIComponent(da)
          }, base === 'http://192.168.4.1' ? 900 : 2400);
          break;
        }catch(err){}
      }
    }catch(e){
      console.warn('autoSyncTimeOnce failed:', e);
    }
  }

  async function refreshHomeData(){
    if(isFrameVisible()) return;
    let base = '';
    // 與主資料並行探測 AP，解決 AP+STA 模式下家用 IP 優先被選中的問題
    const apProbe = (location.hostname === '192.168.4.1')
      ? Promise.resolve(true)
      : probeBase(AP_BASE, 400);
    function showNetwork(b){
      apProbe.then(apOk => setNetworkTextByBase(apOk ? AP_BASE : b));
    }

    try{
      base = await resolveWorkingBase();
      if(!base) throw new Error('device offline');

      const statusPromise = fetchFromBase(base, '/status?_=' + Date.now(), {cache:'no-store'}, (base === AP_BASE) ? 900 : 1600);
      const powerPromise = fetchFromBase(base, '/api/powerlog', {cache:'no-store'}, (base === AP_BASE) ? 900 : 1600);

      try{
        const st = await statusPromise;
        const j = await st.res.json();
        setModeUi(j.m, j.heat, j.heatValid);
        setTempText('setTemp', j.tSet);
        setTempText('realTemp', j.tUp);
        showNetwork(st.base);
      }catch(e){
        console.warn('status load failed:', e);
        showNetwork(base || lastResolvedBase);
      }

      try{
        const pg = await powerPromise;
        const g = await pg.res.json();
        if (g && g.ok){
          const sec = getCurrentMonthSec(g);
          setCostUi(sec);
          writeCostCacheSec(sec);
        }
        showNetwork(pg.base || base || lastResolvedBase);
      }catch(e){
        console.warn('powerlog load failed:', e);
        showNetwork(base || lastResolvedBase);
      }
    }catch(e){
      console.warn('home data load failed:', e);
      showNetwork(base || lastResolvedBase);
    }
  }

  function stopHomePolling(){
    if(homeTimer) clearInterval(homeTimer);
    homeTimer = null;
  }

  function startHomePolling(){
    if(isFrameVisible()) return;
    stopHomePolling();
    primeCostUiFromCache();
    refreshHomeData();
    homeTimer = setInterval(()=>{
      if(isFrameVisible()) return;
      refreshHomeData();
    }, 5000);
  }

  function closeFirstInstallHint(){
    const mask = $('#firstHintMask');
    if(mask) mask.style.display = 'none';
  }
  function openFirstInstallHint(){
    const mask = $('#firstHintMask');
    if(!mask) return;
    mask.style.display = 'flex';
    const btn = $('#firstHintBtn');
    const close = $('#firstHintClose');
    if(btn) btn.onclick = closeFirstInstallHint;
    if(close) close.onclick = closeFirstInstallHint;
    mask.onclick = function(e){ if(e.target === mask) closeFirstInstallHint(); };
  }
  function checkFirstInstallHint(){
    if(!isStandalone) return;
    try{
      const key = 'hmk_first_run_done';
      if(localStorage.getItem(key)) return;
      localStorage.setItem(key, '1');
    }catch(e){}
    openFirstInstallHint();
  }

  function updateInstallUi(){
    const row = $('#installRow');
    if(!row) return;
    row.classList.toggle('show', !isStandalone);
  }

  async function openDevicePage(path){
    let base = '';

    if (location.hostname === '192.168.4.1'){
      base = AP_BASE;
    } else {
      base = await resolveWorkingBase();
    }

    if(!base){
      // v1304：當解析不到可用 base 時，不要退回舊 hmk_ip，直接走 AP。
      // 否則在 AP 模式下若 localStorage 還留著舊 IP，會被錯帶去舊 IP。
      base = AP_BASE;
    }

    const url = base + path;

    if (location.protocol === 'http:' && isStandalone){
      openShellFrame(url);
    } else {
      location.href = url;
    }
  }

  function openSetupConfirm(){
    return new Promise(resolve => {
      let dlg = document.querySelector('#hmk-setup-dialog');
      if(!dlg){
        dlg = document.createElement('div');
        dlg.id = 'hmk-setup-dialog';
        Object.assign(dlg.style, {
          position:'fixed', inset:'0', background:'rgba(0,0,0,.4)', display:'none',
          alignItems:'center', justifyContent:'center', zIndex:'9999'
        });

        dlg.innerHTML = `
          <div style="background:#fff;padding:20px 18px;border-radius:16px;max-width:320px;width:80%;box-shadow:0 4px 20px rgba(0,0,0,.3);text-align:center;color:#222">
            <h3 style="margin:0 0 10px;font-size:18px;">連線確認</h3>
            <p style="margin:0 0 16px;font-size:14px;line-height:1.6;">
              ⚠ 請先開啟手機 Wi‑Fi，<br>並點選 <b>HMK-Setup-xxxx</b>。
            </p>
            <p style="margin:0 0 16px;font-size:13px;color:#666;">請選擇目前狀態：</p>
            <div style="display:flex;gap:10px;justify-content:center;">
              <button data-role="yes" style="flex:1;padding:8px 0;border:none;border-radius:999px;background:#1d9fbd;color:#fff;font-size:14px;">已連接</button>
              <button data-role="no" style="flex:1;padding:8px 0;border:1px solid #ccc;border-radius:999px;background:#f5f5f5;color:#333;font-size:14px;">未連接</button>
            </div>
          </div>
        `;
        document.body.appendChild(dlg);
      }

      const yesBtn = dlg.querySelector('[data-role="yes"]');
      const noBtn = dlg.querySelector('[data-role="no"]');

      const close = (val) => {
        dlg.style.display = 'none';
        resolve(val);
      };

      yesBtn.onclick = () => close(true);
      noBtn.onclick = () => close(false);
      dlg.style.display = 'flex';
    });
  }

  function openInfoDialog(message){
    return new Promise(resolve => {
      let dlg = document.querySelector('#hmk-info-dialog');
      if(!dlg){
        dlg = document.createElement('div');
        dlg.id = 'hmk-info-dialog';
        Object.assign(dlg.style, {
          position:'fixed', inset:'0', background:'rgba(0,0,0,.4)', display:'none',
          alignItems:'center', justifyContent:'center', zIndex:'9999'
        });

        dlg.innerHTML = `
          <div style="background:#fff;padding:20px 18px;border-radius:16px;max-width:320px;width:80%;box-shadow:0 4px 20px rgba(0,0,0,.3);text-align:center;color:#222">
            <h3 style="margin:0 0 10px;font-size:18px;">提醒</h3>
            <p id="hmk-info-text" style="margin:0 0 18px;font-size:14px;line-height:1.6;"></p>
            <button data-role="ok" style="min-width:120px;padding:8px 0;border:none;border-radius:999px;background:#1d9fbd;color:#fff;font-size:14px;">知道了</button>
          </div>
        `;
        document.body.appendChild(dlg);
      }

      const textEl = dlg.querySelector('#hmk-info-text');
      const okBtn = dlg.querySelector('[data-role="ok"]');
      textEl.innerHTML = String(message).replace(/\n/g, '<br>');
      okBtn.onclick = () => { dlg.style.display = 'none'; resolve(); };
      dlg.style.display = 'flex';
    });
  }

  async function openSetupPage(){
    if (location.hostname === '192.168.4.1'){
      const apUrl = AP_BASE + '/setup';
      if (location.protocol === 'http:' && isStandalone){
        openShellFrame(apUrl);
      } else {
        location.href = apUrl;
      }
      return;
    }

    let base = await resolveWorkingBase();

    if(!base){
      const ok = await openSetupConfirm();
      if(!ok){
        await openInfoDialog('請先讓手機連到 HMK-Setup-xxxx，或確認設備已完成連線設定後再試一次。');
        return;
      }
      base = AP_BASE;
    }

    const url = base + '/setup';
    if (location.protocol === 'http:' && isStandalone){
      openShellFrame(url);
    } else {
      location.href = url;
    }
  }

  $('#controlBtn')?.addEventListener('click', ()=>{
    rememberShellView('remote');
    location.href = './remote.html';
  });
  $('#scheduleBtn')?.addEventListener('click', ()=>{
    rememberShellView('schedule');
    location.href = './schedule.html';
  });
  $('#statusBtn')?.addEventListener('click', ()=>{
    rememberShellView('status');
    location.href = './status.html';
  });
  $('#setupBtn')?.addEventListener('click', openSetupPage);
  $('#serviceBtn')?.addEventListener('click', ()=>{ location.href = 'mailto:service@homemark.com.tw'; });

  window.addEventListener('message', e => {
    const s = String(e.data || '');
    const origin = String(e.origin || '');
    const originAllowed = (origin === window.origin) || /^https?:\/\/192\.168\.\d+\.\d+(:\d+)?$/.test(origin);

    const m = s.match(/^saveip:([\d.]*)$/);
    if(m){
      if(!originAllowed){ console.warn('Ignored saveip from origin', origin); return; }
      const ip = m[1] || '';
      saveIp(ip);
      history.replaceState(null, '', location.pathname);
      if(!isFrameVisible()) refreshHomeData();
      try{ if(e.source && e.source.postMessage) e.source.postMessage('ack:saveip', e.origin || '*'); }catch(err){}
      return;
    }

    if (s === 'clearip' && originAllowed){
      saveIp('');
      history.replaceState(null, '', location.pathname);
      if(!isFrameVisible()) refreshHomeData();
      return;
    }

    if (s === 'gohome' && originAllowed){
      try{
        const wrap = $('#frameWrap');
        const frm = $('#hmkFrame');
        if (wrap) wrap.style.display = 'none';
        if (frm) frm.src = 'about:blank';
        setHomeView();
        refreshHomeData();
        startHomePolling();
      }catch(err){}
      return;
    }
  });

  const hm = location.hash.match(/ip=([\d.]+)/);
  if(hm){
    saveIp(hm[1]);
    history.replaceState(null, '', location.pathname);
  }

  window.addEventListener('appinstalled', ()=>{ updateInstallUi(); });
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    updateInstallUi();
  });

  $('#installBtn')?.addEventListener('click', async () => {
    if(deferredPrompt){
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      return;
    }
    await openInfoDialog('請使用瀏覽器的「加入主畫面」功能進行安裝。');
  });

  if('serviceWorker' in navigator){
    if(location.hostname !== '192.168.4.1'){
      const v = (window.HMK_VERSION || '0');
      navigator.serviceWorker.register('./sw.js?v=' + encodeURIComponent(v)).then(reg => {
        try{ reg.update(); }catch(e){}
      }).catch(()=>{});
    }else{
      console.log('Running on device AP — skip service worker registration');
    }
  }

  renderHotspotName();
  updateInstallUi();
  checkFirstInstallHint();
  (async function bootstrapShell(){
    setHomeView();

    if(isFrameVisible()) return;

    autoFetchIpFromAp().finally(() => {
      autoSyncTimeOnce();
      startHomePolling();
    });
  })();

  window.addEventListener('pageshow', ()=>{
    if(isFrameVisible()) return;
    refreshHomeData();
  });
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden || isFrameVisible()) return;
    refreshHomeData();
  });
  </script>
</body>
</html>
